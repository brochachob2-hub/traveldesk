services:
  - type: web
    name: traveldesk-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build --workspace @traveldesk/database && npm run build --workspace @traveldesk/api
    preDeployCommand: npm run migrate:deploy --workspace @traveldesk/api
    startCommand: npm run start --workspace @traveldesk/api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: traveldesk-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: WEB_ORIGIN
        value: http://localhost:3000
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: FLIGHT_PROVIDER
        value: mock
      - key: FLIGHT_PROVIDER_API_KEY
        value: ""
      - key: COOKIE_DOMAIN
        value: ""

databases:
  - name: traveldesk-db
    plan: free
