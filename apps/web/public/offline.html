<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — TravelDesk</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, sans-serif;
      background: #f6f7f8;
      color: #172126;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 400px;
      padding: 48px 32px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 1px 2px #1018280a, 0 3px 12px #1018280a;
    }
    .mark {
      width: 48px;
      height: 48px;
      margin: 0 auto 20px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: linear-gradient(145deg, #168d82, #0d655e);
      color: #fff;
      font-family: Poppins, sans-serif;
      font-size: 16px;
      font-weight: 800;
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { color: #67757b; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">T</div>
    <h1>You're offline</h1>
    <p>Connect to the internet to continue using TravelDesk. We'll save your progress when you're back online.</p>
  </div>
</body>
</html>
